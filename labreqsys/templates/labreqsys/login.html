{% extends 'labreqsys/base.html' %}
{% load static tailwind_tags %}

{% block content %}
<div class="w-full h-hug p-8 pt-6 bg-white rounded-m shadow inline-flex flex-col justify-start items-start gap-2 overflow-hidden">
    <div class="self-stretch py-2.5 px-2.5 border-b border-black/20 inline-flex justify-center items-center gap-1.5">
        <div class="flex-1 h-9 justify-center text-blue-900 text-mm font-semibold">Sign In</div>
    </div>

    <div class="w-full max-w-md mx-auto mt-4">
        <form class="space-y-6" method="POST">
            {% csrf_token %}
            {% if error_message %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative" role="alert">
                <span class="block sm:inline">{{ error_message }}</span>
            </div>
            {% endif %}
            
            <div>
                <label for="username" class="block mb-2 text-left text-sm font-medium text-gray-500">Username *</label>
                <input type="text" name="username" id="username" required 
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5" 
                    placeholder="Enter your username">
            </div>

            <div>
                <label for="password" class="block mb-2 text-left text-sm font-medium text-gray-500">Password *</label>
                <input type="password" name="password" id="password" required 
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5" 
                    placeholder="Enter your password">
            </div>

            <button type="submit" 
                class="w-full justify-center text-white inline-flex items-center bg-primary-700 hover:bg-primary-800 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center">
                Sign in
            </button>

            <div class="text-sm text-center text-gray-500">
                Don't have an account? 
                <a href="{% url 'signup' %}" class="text-primary-700 hover:text-primary-800">Create one</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
