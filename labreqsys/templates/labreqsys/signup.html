{% extends 'labreqsys/base.html' %}
{% load static tailwind_tags %}

{% block content %}
<div class="w-full h-hug p-8 pt-6 bg-white rounded-m shadow inline-flex flex-col justify-start items-start gap-2 overflow-hidden">
    <div class="self-stretch py-2.5 px-2.5 border-b border-black/20 inline-flex justify-center items-center gap-1.5">
        <div class="flex-1 h-9 justify-center text-blue-900 text-mm font-semibold">Create Account</div>
    </div>

    <div class="w-full max-w-md mx-auto mt-4">
        <form class="space-y-6" method="POST">
            {% csrf_token %}
            {% if error_message %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg relative" role="alert">
                <span class="block sm:inline">{{ error_message }}</span>
            </div>
            {% endif %}
            
            <div class="grid gap-2.5 mb-4 sm:grid-cols-2">
                <div>
                    <label for="first_name" class="block mb-2 text-left text-sm font-medium text-gray-500">First Name *</label>
                    <input type="text" name="first_name" id="first_name" required 
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5" 
                        placeholder="Enter first name">
                </div>
                <div>
                    <label for="last_name" class="block mb-2 text-left text-sm font-medium text-gray-500">Last Name *</label>
                    <input type="text" name="last_name" id="last_name" required 
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5" 
                        placeholder="Enter last name">
                </div>
            </div>

            <div>
                <label for="username" class="block mb-2 text-left text-sm font-medium text-gray-500">Username *</label>
                <input type="text" name="username" id="username" required 
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5" 
                    placeholder="Choose a username">
            </div>

            <div>
                <label for="email" class="block mb-2 text-left text-sm font-medium text-gray-500">Email *</label>
                <input type="email" name="email" id="email" required 
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5" 
                    placeholder="Enter your email">
            </div>

            <div>
                <label for="password1" class="block mb-2 text-left text-sm font-medium text-gray-500">Password *</label>
                <input type="password" name="password1" id="password1" required 
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5" 
                    placeholder="Create a password">
            </div>

            <div>
                <label for="password2" class="block mb-2 text-left text-sm font-medium text-gray-500">Confirm Password *</label>
                <input type="password" name="password2" id="password2" required 
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5" 
                    placeholder="Confirm your password">
            </div>

            <button type="submit" 
                class="w-full justify-center text-white inline-flex items-center bg-primary-700 hover:bg-primary-800 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center">
                Create Account
            </button>

            <div class="text-sm text-center text-gray-500">
                Already have an account? 
                <a href="{% url 'login' %}" class="text-primary-700 hover:text-primary-800">Sign in</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
